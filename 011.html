<html>
    <head>
        <style>
            .container{
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                align-items: center;
                align-content: space-between;
                height: 400px;
                background-image: url("https://www.martinomartini.eu/wp-content/uploads/2022/11/Martini_Martino_Palestra_B_290523_Marco_Varrone_WEB-2-e1694170906674.jpg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                gap: 110px;
            }

            .center {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .title {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-around;
            }

            h1 {
                color: white;
                font-family: sans-serif;
                font-size: 35px;
            }

            #discover {
                background-color: #1260a4;
                color: white;
                border-color: transparent;
                height: 50px;
                font-size: 15;
                border-radius: 8px;
                padding: 0 20px 0 20px;
            }

            .icon {
                background-color: transparent;
                border-color: transparent;
                font-size: 20px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div></div>
            <div class="center">
                <div><button class="icon">⬅️</button></div>
                <div class="title">
                    <h1><strong>Molti indirizzi diverse prospettive</strong></h1>
                    <button id="discover">Scopri chi siamo</button>
                </div>
                <div><button class="icon">➡️</button></div>
            </div>

            <div class="bottom">
                <button class="icon">🔵</button>
                <button class="icon">🔵</button>
                <button class="icon">🔵</button>
            </div>
        </div>
    </body>
</html>
