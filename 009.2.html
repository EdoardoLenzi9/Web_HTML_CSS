<html>
    <head>
        <style>
            #top{
                background-color: blue;
                color: white
            }

            .mid{
                background-color: lightgreen;
                color: white
            }

            div{
                background-color: black;
            }

            div{
                background-color: chocolate;
            }
        </style>
    </head>
    <body>
        <div style="background-color: fuchsia;">
            Inline CSS using style attribute
        </div>

        <br/>
        <div id="top">
            CSS reference by id
        </div>

        <br/>
        <div class="mid">
            CSS reference by id
        </div>
        <h1 class="mid">
            CSS reference by id
        </h1>

        <br/>
        <div class="bottom">
            CSS reference by tag name
        </div>
    </body>
</html>
