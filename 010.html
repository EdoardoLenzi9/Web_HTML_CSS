<html>
    <head>
        <style>
            .container {
                display: flex;
                justify-content: space-between;
                padding: 0 10% 0 10%;
            }

            .left {
            display: flex;
            align-items: center;
            gap: 10px;
            }

            .right {
            display: flex;
            align-items: center;
            gap: 10px;

            }

            #logo{

            }

            .title{
                color: #455b71;

                border-radius: 20px;

                font-size: 20px;
            }

            select{
                background-color: transparent;
                border-color: transparent;
                height: 30px;
                font-family: sans-serif;
                font-size: 20px;
            }
        </style>

        <div class="container">

                <img src="logo.svg" id="logo">
                <div class="title">

                </div>
            </div>
            
            <div class="right">
                <select>
                    <option>Scuola</option>
                    <option>Panoramica</option>
                    <option>...</option>
                    <option>Le persone</option>
                    <option>Organizzazione</option>
                </select>
                
                <select>
                    <option>Servizi</option>
                    <option>...</option>
                </select>
                
                <select>
                    <option>Novita'</option>
                    <option>...</option>
                </select>
                
                <select>
                    <option>Didattica</option>
                    <option>...</option>
                </select>
                
                <search>
                    <input placeholder="🔍"></input>
                </search>
            </div>
        </div>
    </body>
</html>
