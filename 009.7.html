<html>
    <head>
        <style>
            body{
                height: 5000px;
            }

            #id1{
                background-color: blue;
                width: 100px;
                height: 100px;
                position: fixed; top: 10px; left: 10px;
            }

            #id2{
                background-color: lightgreen;
                width: 100px;
                height: 100px;
                position: fixed; top: 30px; left: 30px;
            }
        </style>
    </head>
    <body>
        <!-- fixed position, relative to viewport, stay fixed when scrolling -->
        <div id="id1"></div>

        <div id="id2"></div>
    </body>
</html>
